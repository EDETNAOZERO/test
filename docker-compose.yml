services:

  backend:
    container_name: backend
    build:
      context: ./backend/
      dockerfile: Dockerfile
    restart: unless-stopped
    networks: 
      - proxy

  nginx:
    container_name: nginx
    image: nginx:1.29.7-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
#   TEMPORARY port is 79 because 80 is in use at the testing environment
    ports:
     - "79:80"
    networks: 
      - proxy

networks:
  proxy:
    driver: bridge

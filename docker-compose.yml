name: test

services:

  backend:
    container_name: backend
    build:
      context: ./backend/
      dockerfile: Dockerfile
    restart: unless-stopped
    networks: 
      - proxy
    expose:
      - "8080"

  nginx:
    container_name: nginx
    image: nginx:1.29.7-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
     - "80:80"
    restart: unless-stopped
    networks: 
      - proxy
    depends_on:
      backend:
        condition: service_healthy

networks:
  proxy:
    driver: bridge
